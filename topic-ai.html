<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI - SignalBoost Live</title>

<style>
:root{
  --bg:#202533;
  --bg-soft:#272d3d;
  --text:#e9edf5;
  --muted:#aeb7c9;
  --line:rgba(255,255,255,0.08);
  --accent:#4da3ff;
  --radius:18px;
}

body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:linear-gradient(180deg,#1b2130 0%, var(--bg) 100%);
  color:var(--text);
}

.container{
  width:90%;
  max-width:1100px;
  margin:auto;
}

.nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 0;
}

.brand{
  display:flex;
  flex-direction:column;
  align-items:center;
  font-weight:bold;
}

.brand-wave{
  color:var(--accent);
}

.back{
  background:var(--accent);
  color:white;
  padding:10px 16px;
  border-radius:999px;
  text-decoration:none;
}

.section{
  margin-top:30px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:16px;
}

.card{
  background:var(--bg-soft);
  border:1px solid var(--line);
  border-radius:var(--radius);
  overflow:hidden;
}

.card-content{
  padding:12px;
}

iframe{
  width:100%;
  height:200px;
  border:none;
}

.loading{
  color:var(--muted);
}

@media(max-width:900px){
  .grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<div class="container nav">
  <div class="brand">
    <div class="brand-wave">~~~~~</div>
    <div>SignalBoost Live</div>
  </div>
  <a href="index.html" class="back">Back</a>
</div>

<div class="container">
  <h1>AI Replacing Jobs</h1>

  <div class="section">
    <h2>Featured Video</h2>
    <div id="featured" class="loading">Loading...</div>
  </div>

  <div class="section">
    <h2>Top Videos</h2>
    <div id="videos" class="grid"></div>
  </div>
</div>

<script>
const API_KEY = "AIzaSyBWSnsfSNZxY_kYG_ACxm-GQYMsCOEuIuc";
const QUERY = "AI jobs automation";

async function loadVideos(){
  try{
    const res = await fetch(
      `https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=4&q=${encodeURIComponent(QUERY)}&key=${API_KEY}`
    );

    const data = await res.json();

    if(!data.items){
      document.getElementById("featured").innerText = "Error loading videos";
      return;
    }

    const first = data.items[0];

    document.getElementById("featured").innerHTML = `
      <iframe src="https://www.youtube.com/embed/${first.id.videoId}" allowfullscreen></iframe>
      <div class="card-content">
        <h3>${first.snippet.title}</h3>
      </div>
    `;

    const rest = data.items.slice(1);

    document.getElementById("videos").innerHTML = rest.map(v => `
      <div class="card">
        <iframe src="https://www.youtube.com/embed/${v.id.videoId}" allowfullscreen></iframe>
        <div class="card-content">
          <h3>${v.snippet.title}</h3>
        </div>
      </div>
    `).join("");

  }catch(e){
    document.getElementById("featured").innerText = "Failed to load videos";
    console.error(e);
  }
}

loadVideos();
</script>

</body>
</html>

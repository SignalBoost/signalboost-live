<script>
const API_KEY = "AIzaSyBWSnsfSNZxY_kYG_ACxm-GQYMsCOEuIuc";

const HOMEPAGE_QUERY = "AI Bitcoin politics business economy migration debate Joe Rogan Trump automation finance";

/* ---------- STOP OTHER VIDEOS ---------- */
function stopAllVideos(currentFrame) {
  const frames = document.querySelectorAll("iframe");

  frames.forEach(frame => {
    if (frame !== currentFrame) {
      const src = frame.src;
      frame.src = src; // reload = stop video
    }
  });
}

/* ---------- FORMAT VIEWS ---------- */
function formatViews(num) {
  const n = Number(num || 0);
  if (n >= 1000000000) return (n / 1000000000).toFixed(1).replace(".0","") + "B views";
  if (n >= 1000000) return (n / 1000000).toFixed(1).replace(".0","") + "M views";
  if (n >= 1000) return (n / 1000).toFixed(1).replace(".0","") + "K views";
  return n + " views";
}

/* ---------- LOAD VIDEOS ---------- */
async function loadHomepageVideos() {
  const featured = document.getElementById("featured");
  const topVideos = document.getElementById("topVideos");

  try {
    const searchRes = await fetch(
      `https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=12&q=${encodeURIComponent(HOMEPAGE_QUERY)}&key=${API_KEY}`
    );
    const searchData = await searchRes.json();

    const videoIds = searchData.items.map(item => item.id.videoId).join(",");

    const statsRes = await fetch(
      `https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics&id=${videoIds}&key=${API_KEY}`
    );
    const statsData = await statsRes.json();

    const sorted = [...statsData.items].sort((a, b) =>
      Number(b.statistics.viewCount) - Number(a.statistics.viewCount)
    );

    const top = sorted[0];

    featured.innerHTML = `
      <iframe class="hero-feature-frame" src="https://www.youtube.com/embed/${top.id}?enablejsapi=1"></iframe>
      <div class="card-content">
        <h3>${top.snippet.title}</h3>
        <p>${formatViews(top.statistics.viewCount)}</p>
      </div>
    `;

    const rest = sorted.slice(1, 11);

    topVideos.innerHTML = rest.map(v => `
      <div class="card">
        <iframe class="video-frame" src="https://www.youtube.com/embed/${v.id}?enablejsapi=1"></iframe>
        <div class="card-content">
          <h3>${v.snippet.title}</h3>
          <p>${formatViews(v.statistics.viewCount)}</p>
        </div>
      </div>
    `).join("");

    // ADD CLICK LISTENERS
    setTimeout(() => {
      const frames = document.querySelectorAll("iframe");

      frames.forEach(frame => {
        frame.addEventListener("click", () => {
          stopAllVideos(frame);
        });
      });
    }, 500);

  } catch (err) {
    featured.innerHTML = "Failed to load videos";
    console.error(err);
  }
}

loadHomepageVideos();
</script>
